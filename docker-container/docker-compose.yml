services:
  postgres:
    image: postgres:17-alpine
    container_name: summonarr-postgres
    restart: unless-stopped
    # Postgres needs CHOWN/SETUID/SETGID/DAC_OVERRIDE for its init scripts
    # (running initdb as the postgres user inside the container). Drop ALL
    # then re-add only those. no-new-privileges still applies.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    environment:
      POSTGRES_DB: summonarr
      POSTGRES_USER: summonarr
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U summonarr -d summonarr"]
      interval: 10s
      timeout: 5s
      retries: 5

  summonarr:
    image: ghcr.io/summonarr/summonarr:${SUMMONARR_VERSION:-latest}
    container_name: summonarr
    restart: unless-stopped
    # Defense-in-depth hardening — see audit S10-F10.
    # no-new-privileges blocks setuid/setgid escalation; cap_drop ALL strips
    # every Linux capability (Node doesn't need any). tmpfs /tmp routes all
    # short-lived temp writes (mkdtemp from import-session, upload buffers,
    # libvips scratch) to RAM instead of the writable container layer.
    # NOTE: read_only is NOT set — /data and /app/.next/cache need write
    # access. Adding read_only requires per-path volume/tmpfs declarations
    # which is an operator-visible breaking change; deferred to a follow-up.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=128m,mode=1777
    ports:
      - "3001:3000"
    environment:
      PORT: "3000"
      # AUTH_URL (set in .env.local) pins the app's public base URL so auth flows and
      # redirects don't rely on the incoming Host/X-Forwarded-Host header, eliminating
      # the host-header injection risk behind a reverse proxy.
      SYNC_INTERVAL: "${SYNC_INTERVAL:-3600}"
      UPCOMING_SYNC_INTERVAL: "${UPCOMING_SYNC_INTERVAL:-86400}"
      RATINGS_SYNC_INTERVAL: "${RATINGS_SYNC_INTERVAL:-86400}"
      LIST_CACHE_SYNC_INTERVAL: "${LIST_CACHE_SYNC_INTERVAL:-21600}"
      WARM_ACTIVITY_INTERVAL: "${WARM_ACTIVITY_INTERVAL:-1800}"
      WARM_MDBLIST_INTERVAL: "${WARM_MDBLIST_INTERVAL:-86400}"
      WARM_OMDB_INTERVAL: "${WARM_OMDB_INTERVAL:-86400}"
      SCRUB_AUDIT_PII_INTERVAL: "${SCRUB_AUDIT_PII_INTERVAL:-86400}"
      PLAY_HISTORY_SYNC_INTERVAL: "${PLAY_HISTORY_SYNC_INTERVAL:-5}"
      TRASH_SYNC_INTERVAL: "${TRASH_SYNC_INTERVAL:-86400}"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # CMD-SHELL so ${BASE_PATH} expands from the container env (baked in at build for
      # sub-path images); empty for the default root deployment.
      test: ["CMD-SHELL", "wget -qO- \"http://127.0.0.1:3000${BASE_PATH}/api/health\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres-data:
    driver: local
