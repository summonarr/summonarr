services:
  postgres:
    image: postgres:17-alpine
    container_name: summonarr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: summonarr
      POSTGRES_USER: summonarr
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U summonarr -d summonarr"]
      interval: 10s
      timeout: 5s
      retries: 5

  summonarr:
    image: ghcr.io/summonarr/summonarr:latest
    container_name: summonarr
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      PORT: "3000"
      # AUTH_URL pins NextAuth's base URL to a fixed value so it does not rely on the
      # incoming Host/X-Forwarded-Host header. AUTH_TRUST_HOST is still set as a fallback
      # for reverse-proxy deployments that haven't set AUTH_URL yet, but AUTH_URL takes
      # precedence and eliminates the host-header injection risk when it is set.
      AUTH_TRUST_HOST: "true"
      SYNC_INTERVAL: "${SYNC_INTERVAL:-3600}"
      UPCOMING_SYNC_INTERVAL: "${UPCOMING_SYNC_INTERVAL:-86400}"
      RATINGS_SYNC_INTERVAL: "${RATINGS_SYNC_INTERVAL:-86400}"
      LIST_CACHE_SYNC_INTERVAL: "${LIST_CACHE_SYNC_INTERVAL:-21600}"
      WARM_ACTIVITY_INTERVAL: "${WARM_ACTIVITY_INTERVAL:-1800}"
      WARM_MDBLIST_INTERVAL: "${WARM_MDBLIST_INTERVAL:-86400}"
      WARM_OMDB_INTERVAL: "${WARM_OMDB_INTERVAL:-86400}"
      SCRUB_AUDIT_PII_INTERVAL: "${SCRUB_AUDIT_PII_INTERVAL:-86400}"
      PLAY_HISTORY_SYNC_INTERVAL: "${PLAY_HISTORY_SYNC_INTERVAL:-5}"
      TRASH_SYNC_INTERVAL: "${TRASH_SYNC_INTERVAL:-86400}"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres-data:
    driver: local
