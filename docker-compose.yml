services:
  postgres:
    image: postgres:17-alpine
    container_name: summonarr-postgres
    restart: unless-stopped
    # See docker-container/docker-compose.yml for the rationale on these.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    environment:
      POSTGRES_DB: summonarr
      POSTGRES_USER: summonarr
    env_file:
      - .env.local
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U summonarr -d summonarr"]
      interval: 10s
      timeout: 5s
      retries: 5

  summonarr:
    build:
      context: .
      dockerfile: Dockerfile
    image: summonarr:local
    container_name: summonarr
    restart: unless-stopped
    # See docker-container/docker-compose.yml for the rationale on these.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=128m,mode=1777
    ports:
      - "3001:3000"
    environment:
      PORT: "3000"
      # Do NOT re-declare the *_INTERVAL knobs (or AUTH_URL etc.) here.
      # `environment:` entries outrank `env_file:`, and `${VAR:-default}`
      # interpolation reads the HOST shell / `.env` — never `.env.local` — so a
      # `SYNC_INTERVAL=...` set in .env.local (the documented config file) would
      # be silently overridden by the default baked into this block. Everything
      # in .env.local flows into the container via env_file below; the
      # entrypoint and app supply the same built-in defaults when a knob is
      # unset.
    env_file:
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # CMD-SHELL so ${BASE_PATH} expands from the container env (baked in at build for
      # sub-path images); empty for the default root deployment. Mirrors
      # docker-container/docker-compose.yml — keep the two in sync.
      test: ["CMD-SHELL", "wget -qO- \"http://127.0.0.1:3000${BASE_PATH}/api/health\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres-data:
    driver: local
