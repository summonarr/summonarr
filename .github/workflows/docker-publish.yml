name: Publish Docker image

# Builds and pushes the Summonarr image to GHCR on every push to main and on
# version tags. Both "v"-prefixed (v1.2.3) and bare numeric (1.2.3, 0.9) tags
# trigger a build. Tags produced:
#   - <branch>          (e.g. "main") on branch pushes
#   - sha-<short>       (commit SHA, always)
#   - <full-version>    (e.g. "1.2.3" or "0.9.0") on version tag pushes
#   - <major>.<minor>   (e.g. "1.2" or "0.9") on version tag pushes
#   - <major>           (e.g. "1") on version tag pushes
#   - latest            on version tag pushes (tracks the latest release)

on:
  push:
    branches: [main]
    tags:
      - "v[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Workflow-level default. Jobs override with the wider scopes they need
# (packages: write, id-token: write, attestations: write for the publish
# job). Scorecard's TokenPermissionsID flagged the missing top-level
# block; this gives every future job that doesn't opt-in least-privilege
# by default.
permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Skip the main-push build when the push contains a `chore(release):`
    # commit — the subsequent tag push (per the PR-then-tag flow in CLAUDE.md)
    # publishes the same SHA with version tags + `:latest`, so the main-push
    # build would just duplicate work. Tag pushes and manual dispatches always
    # run; non-release main pushes still publish `:main` and `:sha-<short>`.
    if: |
      startsWith(github.ref, 'refs/tags/') ||
      github.event_name == 'workflow_dispatch' ||
      !contains(toJSON(github.event.commits), 'chore(release):')
    permissions:
      contents: read
      packages: write
      # id-token: write enables BuildKit to mint a keyless signing
      # identity for SLSA build provenance attestations. Without it,
      # `provenance: mode=max` falls back to the unsigned form.
      id-token: write
      # attestations: write lets `docker/build-push-action` upload the
      # provenance + SBOM attestation referrers alongside the image.
      attestations: write
      # security-events: write uploads the post-publish Trivy SARIF so
      # every published tag is scanned at publish time, not only `:latest`
      # on the weekly schedule.
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Don't leave the GITHUB_TOKEN persisted in .git/config —
          # build-push-action doesn't push back to the repo. (zizmor:artipacked)
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Supply-chain attestations attached to the image manifest:
          #   - provenance (SLSA v1, mode=max) — full builder + invocation
          #     metadata, signed via the id-token above.
          #   - sbom — SPDX SBOM generated by BuildKit's syft frontend.
          # Both are visible on the GHCR "Provenance" tab and queryable
          # via `cosign verify-attestation` / `docker buildx imagetools`.
          provenance: mode=max
          sbom: true

      # Scan the freshly published image by digest so every published tag
      # (not just `:latest` on the weekly trivy.yml schedule) gets its
      # runtime surface checked. Findings upload to the Security tab;
      # exit-code 0 keeps publishing non-blocking, matching trivy.yml.
      - name: Scan published image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: sarif
          output: trivy-publish.sarif
          exit-code: '0'

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-publish.sarif
          category: trivy-publish
