name: Publish Docker image

# Builds and pushes the Summonarr image to GHCR on every push to main and on
# version tags. Both "v"-prefixed (v1.2.3) and bare numeric (1.2.3, 0.9) tags
# trigger a build. Tags produced:
#   - <branch>          (e.g. "main") on branch pushes
#   - sha-<short>       (commit SHA, always)
#   - <full-version>    (e.g. "1.2.3" or "0.9.0") on version tag pushes
#   - <major>.<minor>   (e.g. "1.2" or "0.9") on version tag pushes
#   - <major>           (e.g. "1") on version tag pushes
#   - latest            on version tag pushes (tracks the latest release)

on:
  push:
    branches: [main]
    tags:
      - "v[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Skip the main-push build when the push contains a `chore(release):`
    # commit — the subsequent tag push (per the PR-then-tag flow in CLAUDE.md)
    # publishes the same SHA with version tags + `:latest`, so the main-push
    # build would just duplicate work. Tag pushes and manual dispatches always
    # run; non-release main pushes still publish `:main` and `:sha-<short>`.
    if: |
      startsWith(github.ref, 'refs/tags/') ||
      github.event_name == 'workflow_dispatch' ||
      !contains(toJSON(github.event.commits), 'chore(release):')
    permissions:
      contents: read
      packages: write
      # id-token: write enables BuildKit to mint a keyless signing
      # identity for SLSA build provenance attestations. Without it,
      # `provenance: mode=max` falls back to the unsigned form.
      id-token: write
      # attestations: write lets `docker/build-push-action` upload the
      # provenance + SBOM attestation referrers alongside the image.
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Supply-chain attestations attached to the image manifest:
          #   - provenance (SLSA v1, mode=max) — full builder + invocation
          #     metadata, signed via the id-token above.
          #   - sbom — SPDX SBOM generated by BuildKit's syft frontend.
          # Both are visible on the GHCR "Provenance" tab and queryable
          # via `cosign verify-attestation` / `docker buildx imagetools`.
          provenance: mode=max
          sbom: true
