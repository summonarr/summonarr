name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan — Monday 15:39 UTC.
    - cron: '39 15 * * 1'

# Cancel stale runs when new commits land on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # GitHub Actions workflow files under .github/workflows/.
          - language: actions
            build-mode: none
          # Next.js app + API routes + src/lib/ integrations.
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # CodeQL reads source only; nothing pushes back. (zizmor:artipacked)
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality
          # src/generated/prisma/ is regenerated by `prisma generate` and
          # must never be hand-edited (CLAUDE.md guardrail 12). Excluding
          # it keeps CodeQL from flagging upstream-client issues we can't
          # fix without patching Prisma itself.
          config: |
            paths-ignore:
              - src/generated/**
              - node_modules/**
              - .next/**

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          category: "/language:${{ matrix.language }}"
