name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan — Monday 15:39 UTC.
    - cron: '39 15 * * 1'

# Cancel stale runs when new commits land on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # GitHub Actions workflow files under .github/workflows/.
          - language: actions
            build-mode: none
          # Next.js app + API routes + src/lib/ integrations.
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # CodeQL reads source only; nothing pushes back. (zizmor:artipacked)
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality
          # src/generated/prisma/ is regenerated by `prisma generate` and
          # must never be hand-edited (CLAUDE.md guardrail 12). Excluding
          # it keeps CodeQL from flagging upstream-client issues we can't
          # fix without patching Prisma itself.
          config: |
            paths-ignore:
              - src/generated/**
              - node_modules/**
              - .next/**

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:${{ matrix.language }}"
