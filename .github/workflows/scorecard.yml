name: Scorecard

# OpenSSF Scorecard — scores the repo against supply-chain best
# practices (pinned action SHAs, branch protection, least-privilege
# tokens, signed releases, fuzzing, dangerous workflow patterns, …).
# Results land in the Security tab and the public OpenSSF dashboard
# at https://securityscorecards.dev/viewer/?uri=github.com/summonarr/summonarr.
#
# Push trigger is required for publish_results=true — Scorecard only
# uploads to the public registry from default-branch pushes. PRs are
# skipped intentionally; the value is the rolling baseline, not per-PR
# enforcement (that's what codeql.yml + zizmor.yml are for).

on:
  branch_protection_rule:
  push:
    branches: [main]
  schedule:
    # Monday 15:51 UTC — slot after codeql (15:39), before zizmor (16:03)
    # so Security-tab uploads stay sequenced.
    - cron: '51 15 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # Upload SARIF to the Security tab.
      security-events: write
      # OIDC token used to publish results to the OpenSSF registry.
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publishes to https://api.securityscorecards.dev so the
          # badge stays current. Public repo, so no PAT required.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          sarif_file: results.sarif
          category: scorecard
