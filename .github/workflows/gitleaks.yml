name: Gitleaks

# Scans for accidentally committed secrets. Env surface worth guarding:
# NEXTAUTH_SECRET, CRON_SECRET, TOKEN_ENCRYPTION_KEY, TMDB_READ_TOKEN,
# BACKUP_DB_PASSWORD, plus Plex/Jellyfin/ARR tokens held in the Setting
# table (not in git, but a belt-and-suspenders net for mistaken .env
# commits).
#
# Uses gitleaks/gitleaks-action@v2 (the wrapper). GITLEAKS_LICENSE
# must be set as a repo or org secret — required for org-owned repos
# like summonarr/summonarr. Grab one at https://gitleaks.io.
#
# Wrapper perks vs. raw CLI:
#   - Auto-posts finding summaries as PR comments.
#   - Uses diff-only scanning on pull_request events (faster).
#   - Writes results.sarif on findings for Security-tab upload below.
#
# Known risk: gitleaks-action@v2 runs on Node 20, which GitHub is
# retiring on GitHub Actions runners (forced to Node 24 on
# 2026-06-02, removed 2026-09-16). If upstream hasn't shipped a
# Node-24 build by then, revert this file to the raw-CLI install
# approach — see commit a6f4994.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '15 15 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      # Action posts finding summaries as PR comments.
      pull-requests: write
      # Upload SARIF to the GitHub Security tab.
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history so scheduled scans catch secrets in older
          # commits; the action auto-diffs on pull_request events.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Upload SARIF
        # Runs even when the scan step fails on findings. The action
        # only emits results.sarif when something was flagged, so skip
        # the upload if the file isn't there.
        if: always() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: gitleaks
