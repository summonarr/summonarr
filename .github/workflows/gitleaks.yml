name: Gitleaks

# Scans for accidentally committed secrets. Env surface worth guarding:
# NEXTAUTH_SECRET, CRON_SECRET, TOKEN_ENCRYPTION_KEY, TMDB_READ_TOKEN,
# BACKUP_DB_PASSWORD, plus Plex/Jellyfin/ARR tokens held in the Setting
# table (not in git, but a belt-and-suspenders net for mistaken .env
# commits).
#
# Uses gitleaks/gitleaks-action@v3 (the wrapper). GITLEAKS_LICENSE
# must be set as a repo or org secret — required for org-owned repos
# like summonarr/summonarr. Grab one at https://gitleaks.io.
#
# Wrapper perks vs. raw CLI:
#   - Auto-posts finding summaries as PR comments.
#   - Uses diff-only scanning on pull_request events (faster).
#   - Writes results.sarif on findings for Security-tab upload below.
#
# v3 migrated the runtime from Node 20 to Node 24 (no input/output/
# behavior changes) ahead of GitHub retiring Node 20 on Actions
# runners (default flipped 2026-06-02, removed 2026-09-16). If a
# future Node bump ever strands this wrapper, revert this file to the
# raw-CLI install approach — see commit a6f4994.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '15 15 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      # Action posts finding summaries as PR comments.
      pull-requests: write
      # Upload SARIF to the GitHub Security tab.
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so scheduled scans catch secrets in older
          # commits; the action auto-diffs on pull_request events.
          fetch-depth: 0
          # Gitleaks reads-only; nothing needs the cached token after
          # checkout. (zizmor:artipacked)
          persist-credentials: false

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Upload SARIF
        # Runs even when the scan step fails on findings. The action
        # only emits results.sarif when something was flagged, so skip
        # the upload if the file isn't there.
        if: always() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: results.sarif
          category: gitleaks
