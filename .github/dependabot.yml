version: 2
updates:
  # npm dependencies (Next.js, Prisma, NextAuth, Tailwind, etc.)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    # Delay PRs for very fresh releases so an attacker-published or
    # accidentally-broken version has time to be yanked upstream
    # before it lands in a PR here. Patch updates wait the least
    # (we want CVE fixes fast); majors wait longest. Default must be
    # >= 7 to satisfy zizmor. (zizmor:dependabot-cooldown)
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 5
      semver-patch-days: 2
    ignore:
      # TypeScript 7 is the native-compiler port with a different JS API:
      # ts.Extension & co. are gone and typescript/lib/typescript.js no longer
      # exists. Next.js 16.2.x probes that file at build time and dies
      # ("please install typescript"), and typescript-eslint crashes loading
      # the package (its own peer range pins typescript <6.1). The root
      # `typescript` therefore MUST stay on 6 until BOTH support TS 7; the
      # native compiler is adopted side-by-side as the `tsgo` alias
      # (npm:typescript@7) powering `npm run typecheck`. The semver-major
      # update-types filter alone did not stop the grouped "across 1
      # directory" PR (#165 ignored, #173 still opened), so pin the version
      # range explicitly.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        versions: [">=7.0.0"]
    groups:
      # Bundle dev-only bumps into a single PR
      dev-dependencies:
        dependency-type: "development"
      # Bundle tiny patches to keep noise down
      patch-updates:
        update-types:
          - "patch"

  # GitHub Actions used in workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    # Action bumps are pinned-by-SHA so we re-verify each release.
    # 7 days catches "tag was rewritten" attacks.
    # (zizmor:dependabot-cooldown)
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 5

  # Docker base image bumps (node:22-alpine, postgres:17-alpine)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"
    # Base-image tags occasionally regress (e.g. a node-25 minor that
    # ships a new alpine variant). 7 days gives the community time to
    # surface breakage and satisfies zizmor's >= 7-day floor.
    # (zizmor:dependabot-cooldown)
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 5
      semver-patch-days: 3
